name: security
on:
  pull_request:
  schedule:
    - cron: "27 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-audit:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync deps
        run: uv sync --frozen

      - name: Validate security-ignores schema
        run: uv run python tools/check_security_ignores.py

      - name: Export requirements for audit
        run: uv export --no-emit-project --frozen > requirements.txt

      - name: Run pip-audit
        run: uv run pip-audit --strict --requirement requirements.txt

      - name: Run safety check
        run: uv run safety check --full-report --file requirements.txt
        continue-on-error: false

  secret-leak-scan:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
