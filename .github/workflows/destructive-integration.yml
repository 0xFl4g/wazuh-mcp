name: destructive-integration

on:
  schedule:
    - cron: "13 5 * * 0"   # weekly Sunday 05:13 UTC
  workflow_dispatch:

concurrency:
  group: destructive-${{ github.ref }}
  cancel-in-progress: false

env:
  # Opt into Node 24 for JS actions ahead of GitHub's June 2026 forced default.
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  destructive:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        wazuh_version:
          - "4.9.0"
          # 4.14.5 dropped v1.0.10 — see integration.yml for rationale.
    env:
      WAZUH_VERSION: ${{ matrix.wazuh_version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync deps
        run: uv sync --all-groups

      - name: Bootstrap Wazuh + Keycloak
        run: bash docker/bootstrap.sh
        env:
          COMPOSE_PROJECT_NAME: wazuh-mcp-destructive
          WAZUH_VERSION: ${{ matrix.wazuh_version }}

      - name: Run destructive integration tests
        run: uv run pytest -m "destructive" -v --junitxml=destructive-report.xml

      - name: Always-dump compose logs
        if: always()
        run: |
          mkdir -p integration-logs
          docker compose -p wazuh-mcp-destructive -f docker/integration-compose.yml ps -a > integration-logs/compose-ps.log 2>&1 || true
          docker compose -p wazuh-mcp-destructive -f docker/integration-compose.yml logs --no-color --tail=2000 > integration-logs/compose.log 2>&1 || true
          for svc in wazuh-manager wazuh-indexer keycloak wazuh-agent; do
            docker compose -p wazuh-mcp-destructive -f docker/integration-compose.yml logs --no-color "$svc" > "integration-logs/${svc}.log" 2>&1 || true
          done

      - name: Always-upload destructive logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: destructive-logs-${{ matrix.wazuh_version }}
          path: integration-logs/
          retention-days: 7

      - name: Always-upload JUnit
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: destructive-junit-${{ matrix.wazuh_version }}
          path: destructive-report.xml
          if-no-files-found: ignore
