name: integration-log-scan

on:
  workflow_run:
    workflows: ["integration", "destructive-integration", "multi-manager-integration"]
    types: [completed]

permissions:
  actions: read
  contents: read
  security-events: write

env:
  # Opt into Node 24 for JS actions ahead of GitHub's June 2026 forced default.
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Download all integration log artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: '*-logs-*'
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: List downloaded artifacts
        run: |
          find artifacts/ -type f -name '*.log' | head -50

      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz" \
            | tar xzf - -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan log artifacts
        run: |
          if [ ! -d artifacts ] || [ -z "$(find artifacts -type f 2>/dev/null)" ]; then
            echo "No artifacts to scan; skipping."
            exit 0
          fi
          gitleaks detect \
            --source artifacts/ \
            --config .gitleaks.toml \
            --redact \
            --report-format sarif \
            --report-path gitleaks-logs.sarif \
            --no-git \
            --verbose

      - name: Upload SARIF to GH Security tab
        # The SARIF upload step requires GitHub Code Scanning to be enabled
        # on the repo. When it is not (default on new private repos), the
        # upload errors with 'Code scanning is not enabled'. The actual
        # operational signal is the gitleaks scan exit code above; this
        # upload is a UI nice-to-have, so its failure must not fail the
        # workflow.
        if: always() && hashFiles('gitleaks-logs.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-logs.sarif
          category: integration-log-scan
