name: ci
on:
  push:
    branches: [main]
  pull_request:

env:
  # Opt into Node 24 for all JavaScript actions ahead of GitHub's June 2026
  # forced default. Silences 'Node.js 20 actions are deprecated' warnings on
  # third-party actions (gitleaks-action@v2, docker/*, codeql-action@v3) that
  # haven't yet shipped Node 24-compatible majors. Drop once upstreams update.
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with: { version: "latest" }
      - name: Install
        run: uv sync --frozen
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Type check (ty)
        run: uv run ty check .
      - name: Unit tests
        run: uv run pytest -m "not integration" -v
