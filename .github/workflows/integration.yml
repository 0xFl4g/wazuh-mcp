name: integration

on:
  schedule:
    - cron: "0 6 * * 1"   # weekly Monday 06:00 UTC
  workflow_dispatch:

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: false

env:
  # Opt into Node 24 for JS actions ahead of GitHub's June 2026 forced default.
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  integration:
    runs-on: ubuntu-latest   # amd64 — avoids QEMU segfault on arm64+darwin
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        wazuh_version:
          - "4.9.0"
          # 4.14.5 dropped v1.0.10 — bootstrap step OOMs/timeouts on the
          # 7GB GH Actions ubuntu-latest runner (image is ~3x larger
          # than 4.9 + Vault + Keycloak + manager). Re-add when runner
          # resources increase or when split to a larger runner class.
    env:
      WAZUH_VERSION: ${{ matrix.wazuh_version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync deps
        run: uv sync --all-groups

      - name: Bootstrap Wazuh + Keycloak
        run: bash docker/bootstrap.sh
        env:
          COMPOSE_PROJECT_NAME: wazuh-mcp-ci
          WAZUH_VERSION: ${{ matrix.wazuh_version }}

      - name: Run integration suite
        run: uv run pytest -m "integration and not destructive and not multi_manager" -v --junitxml=integration-report.xml
        env:
          COMPOSE_PROJECT_NAME: wazuh-mcp-ci
          WAZUH_MCP_REDIS_URL: redis://localhost:6379/0

      - name: Always-dump compose logs
        if: always()
        run: |
          mkdir -p integration-logs
          docker compose -p wazuh-mcp-ci -f docker/integration-compose.yml ps -a > integration-logs/compose-ps.log 2>&1 || true
          docker compose -p wazuh-mcp-ci -f docker/integration-compose.yml logs --no-color --tail=2000 > integration-logs/compose.log 2>&1 || true
          for svc in wazuh-manager wazuh-indexer keycloak wazuh-agent redis; do
            docker compose -p wazuh-mcp-ci -f docker/integration-compose.yml logs --no-color "$svc" > "integration-logs/${svc}.log" 2>&1 || true
          done

      - name: Always-upload integration logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-logs-${{ matrix.wazuh_version }}
          path: integration-logs/
          retention-days: 7

      - name: Always-upload JUnit
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-junit-${{ matrix.wazuh_version }}
          path: integration-report.xml
          if-no-files-found: ignore
