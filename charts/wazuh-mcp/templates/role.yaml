apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "wazuh-mcp.fullname" . }}
  labels:
    {{- include "wazuh-mcp.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames:
      - {{ include "wazuh-mcp.fullname" . }}-tenants
    verbs: ["get"]
  {{- $secretName := include "wazuh-mcp.secretName" . }}
  {{- if $secretName }}
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - {{ $secretName }}
    verbs: ["get"]
  {{- end }}
