{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "wazuh-mcp.fullname" . }}
  labels:
    {{- include "wazuh-mcp.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "wazuh-mcp.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- range .Values.networkPolicy.ingressFromNamespaces }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
    {{- end }}
  egress:
    # Wazuh manager API. Operator should narrow the 0.0.0.0/0 CIDR to the
    # actual cluster-routable IP/CIDR for production.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.egressTo.wazuhManager.port }}
    # Wazuh indexer (OpenSearch).
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.egressTo.wazuhIndexer.port }}
    # OIDC issuer (Keycloak / Okta / etc.).
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.egressTo.oidcIssuer.port }}
    # In-cluster DNS.
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
{{- end }}
