apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "wazuh-mcp.fullname" . }}
  labels:
    {{- include "wazuh-mcp.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "wazuh-mcp.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "wazuh-mcp.serviceAccountName" . }}
