{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wazuh-mcp.fullname" . }}-secrets
  labels:
    {{- include "wazuh-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  # wazuh-mcp's YamlSecretStore reads <config_dir>/secrets.yaml as a single
  # YAML document. The deployment mounts this Secret with subPath:
  # secrets.yaml at /config/secrets.yaml.
  secrets.yaml: |
    {{- .Values.secrets.yaml | nindent 4 }}
{{- end }}
