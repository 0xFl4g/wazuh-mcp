# Single-node Wazuh indexer + Keycloak 26 IdP for integration tests.
services:
  generator:
    image: wazuh/wazuh-certs-generator:0.0.2
    platform: linux/amd64
    hostname: wazuh-certs-generator
    # The stock /entrypoint.sh tries to chown/chmod the bind mount at the end;
    # on macOS Docker Desktop those calls fail even though the certs are
    # already written. Run the cert generation steps manually so we can skip
    # the trailing chown/chmod. Then copy node-1.* to indexer.* so a plain
    # directory bind-mount works on the indexer side.
    entrypoint:
      - bash
      - -c
      - |
        set -e
        cd /tmp
        curl -sfLo wazuh-certs-tool.sh https://packages.wazuh.com/4.8/wazuh-certs-tool.sh
        chmod +x wazuh-certs-tool.sh
        cp /config/certs.yml /tmp/config.yml
        bash /tmp/wazuh-certs-tool.sh -A
        cp -f /tmp/wazuh-certificates/*.pem /tmp/wazuh-certificates/*.key /certificates/
        cp -f /certificates/node-1.pem /certificates/indexer.pem
        cp -f /certificates/node-1-key.pem /certificates/indexer-key.pem
        chmod 644 /certificates/*.pem /certificates/*.key || true
        ls /certificates/indexer.pem /certificates/root-ca.pem /certificates/admin.pem >/dev/null
    volumes:
      - ./config/wazuh_indexer_ssl_certs/:/certificates/
      - ./config/certs.yml:/config/certs.yml:ro

  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.9.0
    platform: linux/amd64
    hostname: wazuh-indexer
    depends_on:
      generator:
        condition: service_completed_successfully
    environment:
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - bootstrap.memory_lock=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    ports:
      - "9200:9200"
    volumes:
      - ./config/opensearch.yml:/usr/share/wazuh-indexer/opensearch.yml:ro
      - ./config/wazuh_indexer_ssl_certs/:/usr/share/wazuh-indexer/certs/:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sk -u admin:admin https://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 90s

  wazuh-manager:
    image: wazuh/wazuh-manager:4.9.0
    platform: linux/amd64
    hostname: wazuh-manager
    depends_on:
      generator:
        condition: service_completed_successfully
      wazuh-indexer:
        condition: service_started
    environment:
      - INDEXER_URL=https://wazuh-indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=admin
      - FILEBEAT_SSL_VERIFICATION_MODE=none
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MCPmcp12345!
    ports:
      - "55000:55000"
    volumes:
      - ./config/wazuh_indexer_ssl_certs/:/etc/ssl/certs/wazuh/:ro
      - ./config/wazuh_manager_ossec.conf:/wazuh-config-mount/etc/ossec.conf:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -skfu wazuh-wui:MCPmcp12345! https://localhost:55000/security/user/authenticate?raw=true | grep -q token"
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 120s

  # Lightweight wazuh-agent so M4b write tools (write.isolate_agent,
  # write.restart_agent, write.run_active_response) have a connected
  # target. Auto-enrolls against wazuh-manager via authd (UDP 1515) on
  # boot; the manager assigns id=001 if no other agents are registered.
  # Without this container the manager accepts the API call but the
  # active-response/restart command queue has no peer to deliver to and
  # the API returns upstream_error.
  wazuh-agent:
    image: wazuh/wazuh-agent:4.9.0
    platform: linux/amd64
    hostname: web-01
    depends_on:
      wazuh-manager:
        condition: service_healthy
    environment:
      - WAZUH_MANAGER=wazuh-manager
      - WAZUH_AGENT_NAME=web-01
      - WAZUH_REGISTRATION_SERVER=wazuh-manager

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    hostname: keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_HTTP_PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - ./config/keycloak-realm.json:/opt/keycloak/data/import/realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/realms/wazuh-mcp/.well-known/openid-configuration >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 30s
